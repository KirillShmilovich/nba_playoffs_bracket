<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Bracket Tracker Tests</title>
<style>body{font-family:monospace;padding:20px}.pass{color:green}.fail{color:red;font-weight:bold}</style>
</head>
<body>
<h1>Bracket Tracker Tests</h1>
<div id="results"></div>
<script type="module">
import { scoreSeries, scoreBracket, isEliminated, ROUND_POINTS, buildSeriesView } from '../scoring.js';
import { normalizeEspn, buildSeriesFromGames } from '../espn.js';
import { PICKS, TEAM_NAMES } from '../picks.js';
import { renderLeaderboard } from '../render.js';

const results = document.getElementById('results');
let passed = 0, failed = 0;

function assertEq(actual, expected, label) {
  const ok = JSON.stringify(actual) === JSON.stringify(expected);
  const div = document.createElement('div');
  div.textContent = `${ok ? 'PASS' : 'FAIL'}: ${label} — expected ${JSON.stringify(expected)}, got ${JSON.stringify(actual)}`;
  div.className = ok ? 'pass' : 'fail';
  results.appendChild(div);
  ok ? passed++ : failed++;
}

// --- scoreSeries tests ---
assertEq(
  scoreSeries({ winner: "OKC", games: 5 }, { winner: "OKC", games: 5, complete: true }, "round1"),
  { points: 2, status: "correct-exact" },
  "round1: correct winner + exact length = 2pt"
);
assertEq(
  scoreSeries({ winner: "OKC", games: 5 }, { winner: "OKC", games: 6, complete: true }, "round1"),
  { points: 1, status: "correct-winner" },
  "round1: correct winner, wrong length = 1pt"
);
assertEq(
  scoreSeries({ winner: "OKC", games: 5 }, { winner: "PHX", games: 6, complete: true }, "round1"),
  { points: 0, status: "wrong" },
  "round1: wrong winner + wrong length = 0pt"
);
assertEq(
  scoreSeries({ winner: "OKC", games: 6 }, { winner: "PHX", games: 6, complete: true }, "round1"),
  { points: 1, status: "correct-length" },
  "round1: wrong winner but correct length = 1pt (length bonus)"
);
assertEq(
  scoreSeries({ winner: "BOS", games: 7 }, { winner: "NYK", games: 7, complete: true }, "confFinals"),
  { points: 2, status: "correct-length" },
  "confFinals: wrong winner but correct length = 2pt (length bonus only)"
);
assertEq(
  scoreSeries({ winner: "BOS", games: 6 }, { winner: "DAL", games: 6, complete: true }, "finals"),
  { points: 3, status: "correct-length" },
  "finals: wrong winner but correct length = 3pt (length bonus only)"
);
assertEq(
  scoreSeries({ winner: "OKC", games: 5 }, { winner: null, games: null, complete: false }, "round1"),
  { points: 0, status: "pending" },
  "round1: incomplete = pending"
);
assertEq(
  scoreSeries({ winner: "BOS", games: 6 }, { winner: "BOS", games: 6, complete: true }, "finals"),
  { points: 11, status: "correct-exact" },
  "finals: correct winner + exact = 11pt (8+3)"
);
assertEq(
  scoreSeries({ winner: "SAS", games: 6 }, { winner: "DET", games: 5, complete: true }, "confFinals"),
  { points: 0, status: "wrong" },
  "confFinals: wrong = 0pt"
);
assertEq(
  scoreSeries({ winner: "DET", games: 5 }, { winner: "DET", games: 6, complete: true }, "round2"),
  { points: 2, status: "correct-winner" },
  "round2: correct winner, wrong length = 2pt"
);

// --- isEliminated tests ---
const liveElim = {
  round1: [
    { matchup: ["OKC","PHX"], winner: "OKC", loser: "PHX", games: 4, complete: true },
    { matchup: ["HOU","LAL"], winner: "LAL", loser: "HOU", games: 6, complete: true },
    { matchup: ["DEN","MIN"], winner: null,  loser: null,  games: null, complete: false }
  ],
  round2: [],
  confFinals: [],
  finals: null
};

assertEq(isEliminated("PHX", liveElim), true,  "PHX eliminated in round1");
assertEq(isEliminated("HOU", liveElim), true,  "HOU eliminated in round1");
assertEq(isEliminated("OKC", liveElim), false, "OKC still alive");
assertEq(isEliminated("DEN", liveElim), false, "DEN series incomplete, not eliminated");
assertEq(isEliminated("BOS", liveElim), false, "BOS unknown in live data, not eliminated");

// --- scoreBracket tests ---
const samplePicks = {
  round1: [
    { winner: "OKC", loser: "PHX", games: 5 },
    { winner: "HOU", loser: "LAL", games: 6 }
  ],
  round2: [
    { winner: "OKC", loser: "HOU", games: 4 }
  ],
  confFinals: [],
  finals: { winner: "OKC", loser: "BOS", games: 5 }
};

const liveAllPending = { round1: [], round2: [], confFinals: [], finals: null };

const scoredPending = scoreBracket(samplePicks, liveAllPending);
assertEq(scoredPending.current, 0, "all pending: current = 0");
assertEq(scoredPending.max, 18, "all pending: max = 18");

const liveR1Done = {
  round1: [
    { matchup: ["OKC","PHX"], winner: "OKC", loser: "PHX", games: 5, complete: true },
    { matchup: ["HOU","LAL"], winner: "LAL", loser: "HOU", games: 6, complete: true }
  ],
  round2: [],
  confFinals: [],
  finals: null
};

const scoredR1 = scoreBracket(samplePicks, liveR1Done);
// OKC in 5 = +2 (exact), HOU in 6 (wrong winner, right length) = +1 length bonus
assertEq(scoredR1.current, 3, "R1 done: current = 3 (OKC exact +2, HOU length-only +1)");
// max = 2 (completed exact) + 1 (completed length-only) + 0 (R2 pick has eliminated HOU) + 11 (finals alive)
assertEq(scoredR1.max, 14, "R1 done: max includes length-only + alive future picks");
assertEq(scoredR1.correctCount, 1, "R1 done: 1 correct-winner series (length-only doesn't count)");
assertEq(scoredR1.totalCompleted, 2, "R1 done: 2 completed series");

// --- render tests ---
const leaderboardHtml = renderLeaderboard([
  { name: "Tester", current: 3, max: 14, correctCount: 1, totalCompleted: 2 },
  { name: "Chaser", current: 2, max: 18, correctCount: 1, totalCompleted: 2 }
]);
assertEq(leaderboardHtml.includes("Possible"), true, "leaderboard: shows possible score column");
assertEq(leaderboardHtml.includes("Tester total possible score"), true, "leaderboard: possible score is labeled");
assertEq(leaderboardHtml.includes('<span class="num possible-col" title="Tester total possible score">14</span>'), true, "leaderboard: renders total possible score");

// --- picks integrity tests ---
function sortedUnique(values) {
  return [...new Set(values)].sort();
}

function teamListForRound(picksInRound) {
  return sortedUnique(picksInRound.flatMap(p => [p.winner, p.loser]));
}

function validatePickSet(name, picks) {
  const errors = [];
  const expectedCounts = { round1: 8, round2: 4, confFinals: 2 };
  for (const [round, expected] of Object.entries(expectedCounts)) {
    if (!Array.isArray(picks[round]) || picks[round].length !== expected) {
      errors.push(`${name} ${round} has ${picks[round]?.length ?? 0} picks`);
    }
    for (const pick of picks[round] || []) {
      if (!TEAM_NAMES[pick.winner]) errors.push(`${name} ${round} unknown winner ${pick.winner}`);
      if (!TEAM_NAMES[pick.loser]) errors.push(`${name} ${round} unknown loser ${pick.loser}`);
      if (pick.winner === pick.loser) errors.push(`${name} ${round} repeats team ${pick.winner}`);
      if (!Number.isInteger(pick.games) || pick.games < 4 || pick.games > 7) {
        errors.push(`${name} ${round} invalid length ${pick.games}`);
      }
    }
  }

  if (!picks.finals) {
    errors.push(`${name} missing finals pick`);
  } else {
    if (!TEAM_NAMES[picks.finals.winner]) errors.push(`${name} finals unknown winner ${picks.finals.winner}`);
    if (!TEAM_NAMES[picks.finals.loser]) errors.push(`${name} finals unknown loser ${picks.finals.loser}`);
    if (picks.finals.winner === picks.finals.loser) errors.push(`${name} finals repeats team ${picks.finals.winner}`);
    if (!Number.isInteger(picks.finals.games) || picks.finals.games < 4 || picks.finals.games > 7) {
      errors.push(`${name} finals invalid length ${picks.finals.games}`);
    }
  }

  const r1Winners = sortedUnique((picks.round1 || []).map(p => p.winner));
  const r2Teams = teamListForRound(picks.round2 || []);
  if (JSON.stringify(r2Teams) !== JSON.stringify(r1Winners)) {
    errors.push(`${name} round2 teams do not match round1 winners`);
  }

  const r2Winners = sortedUnique((picks.round2 || []).map(p => p.winner));
  const cfTeams = teamListForRound(picks.confFinals || []);
  if (JSON.stringify(cfTeams) !== JSON.stringify(r2Winners)) {
    errors.push(`${name} conference finals teams do not match round2 winners`);
  }

  const cfWinners = sortedUnique((picks.confFinals || []).map(p => p.winner));
  const finalsTeams = picks.finals ? sortedUnique([picks.finals.winner, picks.finals.loser]) : [];
  if (JSON.stringify(finalsTeams) !== JSON.stringify(cfWinners)) {
    errors.push(`${name} finals teams do not match conference finals winners`);
  }

  return errors;
}

const pickIntegrityErrors = Object.entries(PICKS).flatMap(([name, picks]) => validatePickSet(name, picks));
assertEq(pickIntegrityErrors, [], "PICKS integrity: counts, teams, lengths, and advancement paths");

// --- normalizeEspn tests ---
assertEq(
  normalizeEspn(null),
  { round1: [], round2: [], confFinals: [], finals: null },
  "normalizeEspn: null → empty"
);
assertEq(
  normalizeEspn({}),
  { round1: [], round2: [], confFinals: [], finals: null },
  "normalizeEspn: empty object → empty"
);

// Fake 5 completed OKC-PHX round 1 games: OKC wins 4-1
function fakeEvent(teamA, teamB, winner, headline, seasonType=3, completed=true, date="2026-04-18T17:00Z") {
  return {
    date,
    season: { type: seasonType },
    competitions: [{
      status: { type: { completed } },
      notes: [{ headline }],
      competitors: [
        { team: { abbreviation: teamA }, winner: winner === teamA },
        { team: { abbreviation: teamB }, winner: winner === teamB }
      ]
    }]
  };
}

const scoreboardSample = {
  events: [
    fakeEvent("OKC","PHX","OKC","West 1st Round - Game 1"),
    fakeEvent("OKC","PHX","OKC","West 1st Round - Game 2"),
    fakeEvent("OKC","PHX","PHX","West 1st Round - Game 3"),
    fakeEvent("OKC","PHX","OKC","West 1st Round - Game 4"),
    fakeEvent("OKC","PHX","OKC","West 1st Round - Game 5")
  ]
};
const out = normalizeEspn(scoreboardSample);
assertEq(out.round1.length, 1, "normalizeEspn: 1 series in round1");
assertEq(out.round1[0].winner, "OKC", "normalizeEspn: winner OKC");
assertEq(out.round1[0].loser, "PHX", "normalizeEspn: loser PHX");
assertEq(out.round1[0].games, 5, "normalizeEspn: 5 games");
assertEq(out.round1[0].complete, true, "normalizeEspn: completed");

// In-progress series (only 2 games played)
const inProgressSample = {
  events: [
    fakeEvent("HOU","LAL","HOU","West 1st Round - Game 1"),
    fakeEvent("HOU","LAL","LAL","West 1st Round - Game 2")
  ]
};
const outIP = normalizeEspn(inProgressSample);
assertEq(outIP.round1.length, 1, "normalizeEspn: 1 in-progress series");
assertEq(outIP.round1[0].complete, false, "normalizeEspn: in-progress complete=false");
assertEq(outIP.round1[0].currentScore, "1-1", "normalizeEspn: currentScore 1-1");

// Non-playoff games should be excluded
const regSeasonSample = {
  events: [ fakeEvent("OKC","PHX","OKC","Regular Season", 2) ]
};
assertEq(normalizeEspn(regSeasonSample).round1.length, 0, "normalizeEspn: regular season excluded");

// NY → NYK mapping
const nyMapping = {
  events: [
    fakeEvent("NY","ATL","NY","East 1st Round - Game 1"),
    fakeEvent("NY","ATL","NY","East 1st Round - Game 2"),
    fakeEvent("NY","ATL","NY","East 1st Round - Game 3"),
    fakeEvent("NY","ATL","NY","East 1st Round - Game 4")
  ]
};
const outNY = normalizeEspn(nyMapping);
assertEq(outNY.round1.length, 1, "normalizeEspn: NY mapped to NYK");
assertEq(outNY.round1[0].winner, "NYK", "normalizeEspn: winner NYK");
assertEq(outNY.round1[0].loser, "ATL", "normalizeEspn: loser ATL");
assertEq(outNY.round1[0].games, 4, "normalizeEspn: sweep 4 games");

// Scheduled playoff series should appear before any completed games exist
const scheduledRound2 = {
  events: [
    fakeEvent("LAL","OKC",null,"West Semifinals - Game 1",3,false,"2026-05-06T00:30Z"),
    fakeEvent("LAL","OKC",null,"West Semifinals - Game 2",3,false,"2026-05-08T01:30Z")
  ]
};
const outScheduled = normalizeEspn(scheduledRound2);
assertEq(outScheduled.round2.length, 1, "normalizeEspn: scheduled round2 series appears");
assertEq(outScheduled.round2[0].matchup, ["LAL","OKC"], "normalizeEspn: scheduled matchup captured");
assertEq(outScheduled.round2[0].complete, false, "normalizeEspn: scheduled series incomplete");
assertEq(outScheduled.round2[0].started, false, "normalizeEspn: scheduled series not started");
assertEq(outScheduled.round2[0].currentScore, "0-0", "normalizeEspn: scheduled series score 0-0");
assertEq(outScheduled.round2[0].nextGameDate, "2026-05-06T00:30Z", "normalizeEspn: scheduled next game date");

// SA → SAS mapping
const saMapping = {
  events: [
    fakeEvent("SA","POR","SA","West 1st Round - Game 1"),
    fakeEvent("SA","POR","SA","West 1st Round - Game 2"),
    fakeEvent("SA","POR","SA","West 1st Round - Game 3"),
    fakeEvent("SA","POR","SA","West 1st Round - Game 4")
  ]
};
const outSA = normalizeEspn(saMapping);
assertEq(outSA.round1.length, 1, "normalizeEspn: SA mapped to SAS");
assertEq(outSA.round1[0].winner, "SAS", "normalizeEspn: winner SAS");
assertEq(outSA.round1[0].loser, "POR", "normalizeEspn: loser POR");
assertEq(outSA.round1[0].games, 4, "normalizeEspn: Spurs sweep counted");

const directGamesSA = buildSeriesFromGames([
  { round: "round1", teamA: "SA", teamB: "POR", winnerAbbr: "SA" },
  { round: "round1", teamA: "SA", teamB: "POR", winnerAbbr: "POR" }
]);
assertEq(directGamesSA.round1[0].matchup, ["POR","SAS"], "buildSeriesFromGames: canonicalizes SA input");
assertEq(directGamesSA.round1[0].currentScore, "1-1", "buildSeriesFromGames: canonicalized current score");

// ESPN uses East/West Finals, not just Conference Finals
const eastFinalsSample = {
  events: [
    fakeEvent("DET","BOS","DET","East Finals - Game 1"),
    fakeEvent("DET","BOS","DET","East Finals - Game 2"),
    fakeEvent("DET","BOS","DET","East Finals - Game 3"),
    fakeEvent("DET","BOS","DET","East Finals - Game 4")
  ]
};
const outEastFinals = normalizeEspn(eastFinalsSample);
assertEq(outEastFinals.confFinals.length, 1, "normalizeEspn: East Finals mapped to conference finals");
assertEq(outEastFinals.confFinals[0].winner, "DET", "normalizeEspn: East Finals winner DET");

// --- buildSeriesView tests ---
const impossibleSeriesView = buildSeriesView({
  "Tester": {
    round1: [],
    round2: [{ winner: "OKC", loser: "HOU", games: 5 }],
    confFinals: [],
    finals: null
  }
}, {
  round1: [
    { matchup: ["HOU","LAL"], winner: "LAL", loser: "HOU", games: 6, complete: true }
  ],
  round2: [],
  confFinals: [],
  finals: null
});
const impossibleRound2 = impossibleSeriesView.round2.find(e => e.matchup.join("|") === "HOU|OKC");
assertEq(impossibleRound2.picks[0].result.status, "eliminated", "buildSeriesView: unmatched impossible picks are eliminated");

const scheduledNoPickView = buildSeriesView({
  "Tester": { round1: [], round2: [], confFinals: [], finals: null }
}, {
  round1: [],
  round2: [
    { matchup: ["LAL","OKC"], winner: null, loser: null, games: null, complete: false, started: false, currentScore: "0-0", nextGameDate: "2026-05-06T00:30Z" }
  ],
  confFinals: [],
  finals: null
});
const officialNoPick = scheduledNoPickView.round2.find(e => e.matchup.join("|") === "LAL|OKC");
assertEq(officialNoPick.actual.matchup, ["LAL","OKC"], "buildSeriesView: official scheduled series appears without picks");
assertEq(officialNoPick.picks.length, 0, "buildSeriesView: official scheduled no-pick matchup has zero picks");

document.title = `${failed === 0 ? 'PASS' : 'FAIL'} ${passed}/${passed + failed}`;
results.insertAdjacentHTML('afterbegin', `<h2>${passed} passed, ${failed} failed</h2>`);
</script>
</body>
</html>
